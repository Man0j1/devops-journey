# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]  
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
      
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["pypy3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
          python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Test with pytest
      run: |
       pytest
      continue-on-error: false
  
  build:

    runs-on: ubuntu-latest
    needs: [ test, lint ]
    steps:
    - uses: actions/checkout@v4
    - name: Build docker image for python application
      run: |
        docker build . --file Dockerfile --tag my-python-app:${GITHUB_SHA}

    - name: Display python version
      run: |
        python --version

    -
        name: Display Login Username
        run: ${{ vars.DOCKERHUB_USERNAME }}
    -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    -
      name: Build and push
      uses: docker/build-push-action@v7
      with:
        push: true
        tags: ${{ vars.DOCKERHUB_USERNAME }}/my-python-app:${GITHUB_SHA}
      

  run:
    needs: [ "build" ]
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Run python app
      run: |
        python app.py
        echo "Build successful"
