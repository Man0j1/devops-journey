name: My First Pipeline
on: 
  push:
    branches:
      - main
jobs:
  Display-Success-push-event:
    runs-on: ubuntu-latest
    steps:
      - name: Display Success Message
        run: echo "Git hub got a push event and the pipeline is successful"
      - name: Run linux commands
        run: |
          echo "Running Linux commands..."
          date
          pwd
          ls -la
      - name: Checkout Repository
        uses: actions/checkout@v2

